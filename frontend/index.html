
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body-wrap {
    display: block;
    font-family: 'DM Sans', sans-serif;
    color: var(--color-text-primary);
    padding: 2rem 1rem;
    max-width: 680px;
    margin: 0 auto;
  }

  .header { text-align: center; margin-bottom: 2.5rem; }

  .wordmark {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .wordmark em {
    font-style: italic;
    color: var(--color-text-secondary);
  }

  .tagline {
    font-size: 14px;
    color: var(--color-text-secondary);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .upload-zone {
    border: 1px dashed var(--color-border-secondary);
    border-radius: var(--border-radius-lg);
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--color-background-secondary);
    position: relative;
    margin-bottom: 1.5rem;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--color-border-primary);
    background: var(--color-background-tertiary);
  }

  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon {
    width: 40px; height: 40px;
    margin: 0 auto 1rem;
    border: 1.5px solid var(--color-border-secondary);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }

  .upload-icon svg { width: 18px; height: 18px; stroke: var(--color-text-secondary); }

  .upload-label {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.6;
  }

  .upload-label strong {
    display: block;
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 4px;
  }

  .file-types {
    font-size: 12px;
    color: var(--color-text-tertiary);
    margin-top: 8px;
    letter-spacing: 0.03em;
  }

  .btn-upload {
    width: 100%;
    padding: 12px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: none;
  }

  .btn-upload:hover { opacity: 0.85; }
  .btn-upload:active { transform: scale(0.99); }
  .btn-upload.visible { display: block; }

  .selected-file {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    margin-bottom: 1rem;
    font-size: 13px;
  }

  .selected-file.visible { display: flex; }

  .file-thumb {
    width: 36px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    border: 0.5px solid var(--color-border-tertiary);
    flex-shrink: 0;
  }

  .file-info { flex: 1; min-width: 0; }
  .file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { color: var(--color-text-tertiary); font-size: 12px; margin-top: 2px; }

  .btn-clear {
    background: none; border: none; cursor: pointer;
    color: var(--color-text-tertiary); font-size: 18px; line-height: 1;
    padding: 4px; flex-shrink: 0;
  }

  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    overflow: hidden;
  }

  .step {
    flex: 1;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--color-text-tertiary);
    border-right: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .step:last-child { border-right: none; }

  .step-num {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500;
    flex-shrink: 0;
    color: var(--color-text-secondary);
  }

  .step.active .step-num {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border-color: var(--color-text-primary);
  }

  .step.active { color: var(--color-text-primary); }

  .step.done .step-num {
    background: var(--color-background-success);
    border-color: var(--color-border-success);
    color: var(--color-text-success);
  }

  .result-panel {
    display: none;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
  }

  .result-panel.visible { display: block; }

  .result-image-wrap {
    background: var(--color-background-secondary);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 240px;
  }

  .checkered {
    background-image: linear-gradient(45deg, #ddd 25%, transparent 25%),
      linear-gradient(-45deg, #ddd 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #ddd 75%),
      linear-gradient(-45deg, transparent 75%, #ddd 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
  }

  .result-img {
    max-width: 100%;
    max-height: 320px;
    object-fit: contain;
    position: relative;
    z-index: 1;
  }

  .processing-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    background: var(--color-background-secondary);
    z-index: 2;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--color-border-tertiary);
    border-top-color: var(--color-text-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-label {
    font-size: 13px;
    color: var(--color-text-secondary);
  }

  .result-footer {
    padding: 12px 16px;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-url {
    flex: 1;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--color-text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 7px 10px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
  }

  .btn-copy, .btn-delete {
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: opacity 0.15s;
    flex-shrink: 0;
  }

  .btn-copy {
    background: var(--color-text-primary);
    color: var(--color-background-primary);
    border: none;
  }

  .btn-delete {
    background: none;
    border: 0.5px solid var(--color-border-secondary);
    color: var(--color-text-danger);
  }

  .btn-copy:hover, .btn-delete:hover { opacity: 0.75; }

  .error-banner {
    display: none;
    padding: 10px 14px;
    background: var(--color-background-danger);
    border: 0.5px solid var(--color-border-danger);
    border-radius: var(--border-radius-md);
    font-size: 13px;
    color: var(--color-text-danger);
    margin-bottom: 1rem;
  }

  .error-banner.visible { display: block; }
</style>

<body-wrap>
  <div class="header">
    <div class="wordmark">Flip<em>Cut</em></div>
    <div class="tagline">Remove background. Flip. Share. Done.</div>
  </div>

  <div class="steps" id="steps">
    <div class="step active" id="step1">
      <div class="step-num">1</div> Choose image
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div> Processing
    </div>
    <div class="step" id="step3">
      <div class="step-num">3</div> Done
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" />
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="upload-label">
      <strong>Drop your image here</strong>
      or click to browse
    </div>
    <div class="file-types">PNG · JPG · WEBP</div>
  </div>

  <div class="selected-file" id="selectedFile">
    <img class="file-thumb" id="fileThumb" src="" alt="" />
    <div class="file-info">
      <div class="file-name" id="fileName"></div>
      <div class="file-size" id="fileSize"></div>
    </div>
    <button class="btn-clear" id="btnClear" title="Remove">×</button>
  </div>

  <button class="btn-upload" id="btnUpload">Process image →</button>

  <div class="result-panel" id="resultPanel">
    <div class="result-image-wrap checkered" id="imageWrap">
      <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
        <div class="processing-label" id="processingLabel">Removing background…</div>
      </div>
      <img class="result-img" id="resultImg" src="" alt="Processed result" style="display:none;" />
    </div>
    <div class="result-footer">
      <div class="result-url" id="resultUrl">—</div>
      <button class="btn-copy" id="btnCopy">Copy URL</button>
      <button class="btn-delete" id="btnDelete">Delete</button>
    </div>
  </div>
</body-wrap>

<script>
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');
const selectedFile = document.getElementById('selectedFile');
const fileThumb = document.getElementById('fileThumb');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const btnClear = document.getElementById('btnClear');
const btnUpload = document.getElementById('btnUpload');
const resultPanel = document.getElementById('resultPanel');
const processingOverlay = document.getElementById('processingOverlay');
const processingLabel = document.getElementById('processingLabel');
const resultImg = document.getElementById('resultImg');
const resultUrl = document.getElementById('resultUrl');
const btnCopy = document.getElementById('btnCopy');
const btnDelete = document.getElementById('btnDelete');
const errorBanner = document.getElementById('errorBanner');

const API_BASE = 'https://YOUR_API_GATEWAY_URL';
let currentUuid = null;
let pollInterval = null;

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return Math.round(b / 1024) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const s = document.getElementById('step' + i);
    s.classList.remove('active', 'done');
    if (i < n) s.classList.add('done');
    if (i === n) s.classList.add('active');
  });
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add('visible');
}

function clearError() {
  errorBanner.classList.remove('visible');
}

function onFileSelected(file) {
  if (!file) return;
  clearError();
  const reader = new FileReader();
  reader.onload = e => { fileThumb.src = e.target.result; };
  reader.readAsDataURL(file);
  fileName.textContent = file.name;
  fileSize.textContent = formatBytes(file.size);
  selectedFile.classList.add('visible');
  btnUpload.classList.add('visible');
  uploadZone.style.display = 'none';
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) onFileSelected(e.target.files[0]); });

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) onFileSelected(e.dataTransfer.files[0]);
});

btnClear.addEventListener('click', () => {
  fileInput.value = '';
  selectedFile.classList.remove('visible');
  btnUpload.classList.remove('visible');
  uploadZone.style.display = '';
  setStep(1);
  clearError();
});

btnUpload.addEventListener('click', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  clearError();
  setStep(2);
  btnUpload.disabled = true;
  btnUpload.textContent = 'Uploading…';
  resultPanel.classList.add('visible');
  processingOverlay.style.display = 'flex';
  resultImg.style.display = 'none';
  processingLabel.textContent = 'Uploading image…';

  try {
    const form = new FormData();
    form.append('image', file);
    const res = await fetch(`${API_BASE}/images`, { method: 'POST', body: form });
    if (!res.ok) throw new Error('Upload failed');
    const { uuid } = await res.json();
    currentUuid = uuid;
    resultUrl.textContent = `${API_BASE}/images/${uuid}`;
    processingLabel.textContent = 'Removing background…';
    startPolling(uuid);
  } catch (err) {
    showError('Upload failed. Please try again.');
    btnUpload.disabled = false;
    btnUpload.textContent = 'Process image →';
    setStep(1);
    resultPanel.classList.remove('visible');
  }
});

function startPolling(uuid) {
  let attempts = 0;
  const maxAttempts = 30;
  const labels = ['Removing background…', 'Flipping image…', 'Saving to cloud…'];
  let labelIdx = 0;

  pollInterval = setInterval(async () => {
    attempts++;
    if (attempts % 4 === 0) {
      labelIdx = (labelIdx + 1) % labels.length;
      processingLabel.textContent = labels[labelIdx];
    }

    if (attempts > maxAttempts) {
      clearInterval(pollInterval);
      showError('Processing timed out. Please try again.');
      setStep(1);
      resultPanel.classList.remove('visible');
      btnUpload.disabled = false;
      btnUpload.textContent = 'Process image →';
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/images/${uuid}`);
      if (!res.ok) return;
      const data = await res.json();
      if (data.status === 'done' && data.url) {
        clearInterval(pollInterval);
        processingLabel.textContent = 'Done!';
        setTimeout(() => {
          processingOverlay.style.display = 'none';
          resultImg.src = data.url;
          resultImg.style.display = 'block';
          resultUrl.textContent = data.url;
          setStep(3);
          btnUpload.disabled = false;
          btnUpload.textContent = 'Process image →';
        }, 400);
      }
    } catch (_) {}
  }, 2000);
}

btnCopy.addEventListener('click', () => {
  navigator.clipboard.writeText(resultUrl.textContent).then(() => {
    btnCopy.textContent = 'Copied!';
    setTimeout(() => { btnCopy.textContent = 'Copy URL'; }, 1500);
  });
});

btnDelete.addEventListener('click', async () => {
  if (!currentUuid) return;
  btnDelete.textContent = 'Deleting…';
  btnDelete.disabled = true;
  try {
    await fetch(`${API_BASE}/images/${currentUuid}`, { method: 'DELETE' });
    resultPanel.classList.remove('visible');
    selectedFile.classList.remove('visible');
    btnUpload.classList.remove('visible');
    uploadZone.style.display = '';
    fileInput.value = '';
    currentUuid = null;
    setStep(1);
  } catch (_) {
    showError('Delete failed. Please try again.');
  } finally {
    btnDelete.textContent = 'Delete';
    btnDelete.disabled = false;
  }
});
</script>
